name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build wheel (${{ matrix.os }} / ${{ matrix.target }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64,  manylinux: auto }
          - { os: ubuntu-latest,  target: aarch64, manylinux: auto }
          - { os: macos-13,       target: x86_64 }
          - { os: macos-14,       target: aarch64 }
          - { os: windows-latest, target: x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - name: Smoke-test wheel (native runners only)
        if: matrix.target == 'x86_64' || (matrix.os == 'macos-14' && matrix.target == 'aarch64')
        shell: bash
        run: |
          VENV="${RUNNER_TEMP:-/tmp}/v"
          python -m venv "$VENV"
          if [ -d "$VENV/Scripts" ]; then BIN="$VENV/Scripts"; else BIN="$VENV/bin"; fi
          "$BIN/pip" install --upgrade pip
          "$BIN/pip" install dist/*.whl
          # Verify the binary is installed and launches. We pass non-existent
          # input files and expect a clean non-zero exit (not a segfault).
          if "$BIN/py-uv-audit" --pyproject /nonexistent.toml --lockfile /nonexistent.lock; then
            echo "✗ binary should have failed on missing input files"
            exit 1
          fi
          echo "✓ binary launches and exits cleanly on bad input"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/

  sdist:
    name: Build sdist
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/py-uv-audit/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
