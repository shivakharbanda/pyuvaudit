name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Rust lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build wheel (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          rust-toolchain: "1.95"

      - name: Smoke-test wheel
        shell: bash
        run: |
          VENV="${RUNNER_TEMP:-/tmp}/v"
          python -m venv "$VENV"
          if [ -d "$VENV/Scripts" ]; then BIN="$VENV/Scripts"; else BIN="$VENV/bin"; fi
          "$BIN/pip" install --upgrade pip
          "$BIN/pip" install dist/*.whl
          # Bare invocation prints help and exits 0
          "$BIN/py-uv-audit"
          # `audit` against missing files should exit non-zero with the friendly error
          if "$BIN/py-uv-audit" audit --pyproject /nonexistent.toml --lockfile /nonexistent.lock; then
            echo "✗ audit subcommand should have failed on missing input files"
            exit 1
          fi
          echo "✓ binary launches, prints help, and exits cleanly on bad input"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  sdist:
    name: Build sdist
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist
          rust-toolchain: "1.95"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/py-uv-audit/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
